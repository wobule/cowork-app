name: Deploy PDF Editor to GitHub Pages

on:
  push:
    branches: [main, claude/pdf-editor-viewer-pfnAo]
    paths:
      - 'pdf-editor-browser.html'
      - '.github/workflows/deploy-pdf-editor.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare pages directory
        run: |
          mkdir -p _site
          cp pdf-editor-browser.html _site/index.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
