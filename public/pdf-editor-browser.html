<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF 編輯器</title>
<script src="https://unpkg.com/fabric@6.6.1/dist/index.min.js"></script>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<style>
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #111118;
  --bg-tertiary: #1a1a24;
  --bg-hover: #252533;
  --bg-active: #2a2a3a;
  --border: #2a2a3a;
  --border-light: #1e1e2a;
  --text-primary: #e8e8ed;
  --text-secondary: #8b8b9e;
  --text-tertiary: #5c5c72;
  --accent: #6366f1;
  --accent-hover: #818cf8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg-primary); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; overflow: hidden; }
button { background: none; border: none; color: inherit; cursor: pointer; font: inherit; }
input, select { font: inherit; }

/* Layout */
#app { display: flex; flex-direction: column; height: 100vh; }

/* Toolbar */
#toolbar {
  display: flex; align-items: center; gap: 4px; padding: 6px 8px;
  border-bottom: 1px solid var(--border); background: var(--bg-secondary); flex-shrink: 0; flex-wrap: wrap;
}
.tb { padding: 6px 7px; border-radius: 6px; color: var(--text-secondary); transition: all .15s; display: flex; align-items: center; justify-content: center; }
.tb:hover { background: var(--bg-hover); color: var(--text-primary); }
.tb.active { background: var(--bg-active); color: var(--accent); }
.tb:disabled { opacity: .3; cursor: not-allowed; }
.tb svg { width: 16px; height: 16px; stroke-width: 1.5; fill: none; stroke: currentColor; }
.sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; flex-shrink: 0; }
.page-input {
  width: 40px; text-align: center; background: var(--bg-tertiary); border: 1px solid var(--border-light);
  border-radius: 4px; padding: 2px 4px; color: var(--text-primary); font-size: 13px;
  -moz-appearance: textfield;
}
.page-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.page-info { font-size: 13px; color: var(--text-secondary); margin: 0 4px; white-space: nowrap; }
.zoom-info { font-size: 13px; color: var(--text-secondary); width: 48px; text-align: center; user-select: none; }

/* Colors */
.color-dot {
  width: 18px; height: 18px; border-radius: 50%; border: 2px solid transparent;
  transition: transform .15s, border-color .15s; flex-shrink: 0;
}
.color-dot.active { border-color: #fff; transform: scale(1.15); }
.stroke-sel {
  background: var(--bg-tertiary); border: 1px solid var(--border-light);
  border-radius: 4px; padding: 2px 4px; font-size: 12px; color: var(--text-secondary); margin-left: 4px;
}

/* Main area */
#main { display: flex; flex: 1; overflow: hidden; }

/* Sidebar */
#sidebar {
  width: 160px; flex-shrink: 0; background: var(--bg-secondary); border-right: 1px solid var(--border);
  overflow-y: auto; display: flex; flex-direction: column;
}
#sidebar-header { padding: 8px 12px; font-size: 12px; color: var(--text-tertiary); border-bottom: 1px solid var(--border); font-weight: 500; }
#thumbs { display: flex; flex-direction: column; gap: 8px; padding: 8px; align-items: center; }
.thumb-btn {
  position: relative; border-radius: 6px; overflow: hidden; border: 2px solid transparent;
  transition: border-color .15s; cursor: pointer; background: none; padding: 0;
}
.thumb-btn.active { border-color: var(--accent); }
.thumb-btn:hover:not(.active) { border-color: var(--border); }
.thumb-btn canvas { display: block; max-width: 136px; }
.thumb-num {
  position: absolute; bottom: 4px; right: 4px; font-size: 10px;
  background: rgba(10,10,15,.8); color: var(--text-secondary); padding: 1px 4px; border-radius: 3px;
}

/* Canvas area */
#canvas-area { flex: 1; overflow: auto; display: flex; align-items: flex-start; justify-content: center; padding: 16px; background: var(--bg-primary); }
#canvas-wrap { position: relative; box-shadow: 0 8px 32px rgba(0,0,0,.5); }
#pdf-canvas { display: block; }
#fabric-canvas { position: absolute; top: 0; left: 0; }
.canvas-container { position: absolute !important; top: 0; left: 0; }

/* Upload */
#upload-overlay {
  flex: 1; display: flex; align-items: center; justify-content: center;
}
#upload-box {
  display: flex; flex-direction: column; align-items: center; gap: 16px;
  padding: 64px; border-radius: 16px; border: 2px dashed var(--border);
  transition: border-color .2s, background .2s; cursor: pointer;
}
#upload-box:hover, #upload-box.drag { border-color: var(--accent); background: rgba(99,102,241,.08); }
#upload-box svg { width: 48px; height: 48px; stroke: var(--text-tertiary); stroke-width: 1; fill: none; }

/* Status bar */
#status-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 12px; border-top: 1px solid var(--border); background: var(--bg-secondary);
  font-size: 11px; color: var(--text-tertiary); flex-shrink: 0;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-active); border-radius: 3px; }
</style>
</head>
<body>
<div id="app">
  <!-- Toolbar -->
  <div id="toolbar">
    <button class="tb" id="btn-sidebar" title="縮圖面板">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
    </button>
    <div class="sep"></div>
    <button class="tb" id="btn-open" title="開啟檔案">
      <svg viewBox="0 0 24 24"><path d="M5 19a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h4l2 2h4a2 2 0 0 1 2 2v1"/><path d="M20.1 11H6.8a2 2 0 0 0-1.9 1.4L3 19h14.1a2 2 0 0 0 1.9-1.4L21 11Z"/></svg>
    </button>
    <button class="tb" id="btn-download" title="下載 PDF" disabled>
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </button>
    <div class="sep"></div>
    <button class="tb" id="btn-prev" title="上一頁" disabled>
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <input type="number" class="page-input" id="page-input" value="1" min="1" disabled>
    <span class="page-info" id="page-info">/ 0</span>
    <button class="tb" id="btn-next" title="下一頁" disabled>
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <div class="sep"></div>
    <button class="tb" id="btn-zout" title="縮小">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
    <span class="zoom-info" id="zoom-info">100%</span>
    <button class="tb" id="btn-zin" title="放大">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
    <button class="tb" id="btn-fit" title="適合寬度">
      <svg viewBox="0 0 24 24"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
    </button>
    <div class="sep"></div>
    <button class="tb active" data-tool="select" title="選取">
      <svg viewBox="0 0 24 24"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>
    </button>
    <button class="tb" data-tool="editText" title="編輯原文">
      <svg viewBox="0 0 24 24"><path d="M4 7h11M4 12h16M4 17h13"/><rect x="17" y="4" width="2.5" height="14" rx="1" fill="currentColor" opacity=".7"/></svg>
    </button>
    <button class="tb" data-tool="highlight" title="螢光筆">
      <svg viewBox="0 0 24 24"><path d="m9 11-6 6v3h9l3-3"/><path d="m22 12-4.6 4.6a2 2 0 0 1-2.8 0l-5.2-5.2a2 2 0 0 1 0-2.8L14 4"/></svg>
    </button>
    <button class="tb" data-tool="text" title="文字">
      <svg viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
    </button>
    <button class="tb" data-tool="draw" title="畫筆">
      <svg viewBox="0 0 24 24"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/></svg>
    </button>
    <button class="tb" data-tool="rectangle" title="矩形">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
    </button>
    <button class="tb" data-tool="eraser" title="橡皮擦">
      <svg viewBox="0 0 24 24"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><line x1="2" y1="21" x2="22" y2="21"/></svg>
    </button>
    <div class="sep"></div>
    <div style="display:flex;align-items:center;gap:3px;">
      <button class="color-dot active" data-color="#ef4444" style="background:#ef4444;"></button>
      <button class="color-dot" data-color="#f59e0b" style="background:#f59e0b;"></button>
      <button class="color-dot" data-color="#34d399" style="background:#34d399;"></button>
      <button class="color-dot" data-color="#4c8dff" style="background:#4c8dff;"></button>
      <button class="color-dot" data-color="#6366f1" style="background:#6366f1;"></button>
      <button class="color-dot" data-color="#8b5cf6" style="background:#8b5cf6;"></button>
      <button class="color-dot" data-color="#ec4899" style="background:#ec4899;"></button>
      <button class="color-dot" data-color="#e8e8ed" style="background:#e8e8ed;"></button>
    </div>
    <select class="stroke-sel" id="stroke-sel">
      <option value="1">1px</option>
      <option value="2" selected>2px</option>
      <option value="4">4px</option>
      <option value="8">8px</option>
    </select>
    <div class="sep"></div>
    <button class="tb" id="btn-undo" title="復原 (Ctrl+Z)" disabled>
      <svg viewBox="0 0 24 24"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
    </button>
    <button class="tb" id="btn-redo" title="重做 (Ctrl+Shift+Z)" disabled>
      <svg viewBox="0 0 24 24"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/></svg>
    </button>
  </div>

  <!-- Main -->
  <div id="main">
    <!-- Sidebar -->
    <div id="sidebar" style="display:none;">
      <div id="sidebar-header">頁面</div>
      <div id="thumbs"></div>
    </div>

    <!-- Upload Overlay -->
    <div id="upload-overlay">
      <div id="upload-box">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <div style="text-align:center;">
          <p style="font-size:16px;font-weight:500;">拖曳 PDF 檔案至此處</p>
          <p style="font-size:13px;color:var(--text-tertiary);margin-top:4px;">或點擊選擇檔案</p>
        </div>
      </div>
    </div>

    <!-- Canvas Area (hidden initially) -->
    <div id="canvas-area" style="display:none;">
      <div id="canvas-wrap">
        <canvas id="pdf-canvas"></canvas>
        <canvas id="fabric-canvas"></canvas>
      </div>
    </div>
  </div>

  <!-- Status bar -->
  <div id="status-bar">
    <span id="status-name">PDF 編輯器</span>
    <span id="status-info"></span>
  </div>
</div>

<input type="file" id="file-input" accept=".pdf,application/pdf" style="display:none;">

<script type="module">
// ===== PDF.js Setup =====
let pdfjsLib;
try {
  pdfjsLib = await import('https://unpkg.com/pdfjs-dist@4.10.38/build/pdf.min.mjs');
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://unpkg.com/pdfjs-dist@4.10.38/build/pdf.worker.min.mjs';
} catch (e) {
  console.error('PDF.js load failed:', e);
  document.getElementById('status-name').textContent = 'PDF.js 載入失敗，請檢查網路連線';
}

// ===== State =====
const S = {
  pdfDoc: null,
  pdfBytes: null,
  fileName: '',
  currentPage: 1,
  totalPages: 0,
  zoom: 1.0,
  activeTool: 'select',
  color: '#ef4444',
  strokeWidth: 2,
  sidebarOpen: false,
  fc: null,               // fabric canvas
  annotations: new Map(),  // page -> JSON string
  history: [],
  historyIdx: -1,
  isRestoring: false,
  drawObj: null,
  pageTextItems: [],         // extracted text items for current page
  toUnicodeMaps: new Map(),  // cache "pageIdx:fontName" → {forward, reverse}
  fallbackFont: null,        // lazy-loaded Noto Sans SC font bytes
};

// ===== DOM Refs =====
const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

const els = {
  toolbar: $('#toolbar'),
  sidebar: $('#sidebar'),
  thumbs: $('#thumbs'),
  uploadOverlay: $('#upload-overlay'),
  uploadBox: $('#upload-box'),
  canvasArea: $('#canvas-area'),
  pdfCanvas: $('#pdf-canvas'),
  fabricCanvas: $('#fabric-canvas'),
  fileInput: $('#file-input'),
  pageInput: $('#page-input'),
  pageInfo: $('#page-info'),
  zoomInfo: $('#zoom-info'),
  statusName: $('#status-name'),
  statusInfo: $('#status-info'),
};

// ===== Helpers =====
function updateStatus() {
  els.statusName.textContent = S.fileName || 'PDF 編輯器';
  els.statusInfo.textContent = S.totalPages
    ? `第 ${S.currentPage} 頁，共 ${S.totalPages} 頁 · ${Math.round(S.zoom * 100)}%`
    : '';
  els.zoomInfo.textContent = `${Math.round(S.zoom * 100)}%`;
  els.pageInput.value = S.currentPage;
  els.pageInput.max = S.totalPages;
  els.pageInfo.textContent = `/ ${S.totalPages}`;

  $('#btn-prev').disabled = S.currentPage <= 1;
  $('#btn-next').disabled = S.currentPage >= S.totalPages;
  $('#btn-download').disabled = !S.pdfDoc;
  els.pageInput.disabled = !S.pdfDoc;
  updateUndoRedo();
}

function updateUndoRedo() {
  $('#btn-undo').disabled = S.historyIdx <= 0;
  $('#btn-redo').disabled = S.historyIdx >= S.history.length - 1;
}

const CUSTOM_PROPS = ['_isTextEdit','_isTextEditBg','_isTextBlock','_isHoverHighlight','_origStr','_pdfX','_pdfY','_pdfFontSize','_pdfWidth','_fontName'];

// Serialize canvas, filtering out transient objects (text block outlines, hover highlights)
function serializeCanvas() {
  const liveObjs = S.fc.getObjects();
  const data = S.fc.toJSON(CUSTOM_PROPS);
  // fabric.js v6 may not serialize custom underscore-prefixed properties;
  // manually inject them from the live canvas objects to ensure they survive round-trip
  if (data.objects.length === liveObjs.length) {
    data.objects.forEach((serialized, i) => {
      const live = liveObjs[i];
      for (const prop of CUSTOM_PROPS) {
        if (live[prop] !== undefined) serialized[prop] = live[prop];
      }
    });
  }
  data.objects = data.objects.filter(o => !o._isHoverHighlight && !o._isTextBlock);
  return JSON.stringify(data);
}

function pushHistory() {
  if (S.isRestoring || !S.fc) return;
  const json = serializeCanvas();
  S.history = S.history.slice(0, S.historyIdx + 1);
  S.history.push(json);
  S.historyIdx = S.history.length - 1;
  updateUndoRedo();
}

function saveAnnotations(page) {
  if (!S.fc) return;
  S.annotations.set(page, serializeCanvas());
}

// ===== PDF Loading =====
async function loadPdf(file, data) {
  try {
    S.pdfDoc = await pdfjsLib.getDocument({ data: data.slice(0) }).promise;
    S.pdfBytes = data;
    S.fileName = file.name;
    S.totalPages = S.pdfDoc.numPages;
    S.currentPage = 1;
    S.zoom = 1.0;
    S.annotations.clear();
    S.history = [];
    S.historyIdx = -1;

    els.uploadOverlay.style.display = 'none';
    els.canvasArea.style.display = 'flex';

    initFabric();
    await renderPage();
    renderThumbnails();
    updateStatus();
  } catch (e) {
    console.error('PDF load error:', e);
    alert('無法載入 PDF 檔案: ' + (e.message || e));
  }
}

// ===== Fabric.js Init =====
function initFabric() {
  if (S.fc) S.fc.dispose();
  S.fc = new fabric.Canvas(els.fabricCanvas, {
    isDrawingMode: false,
    selection: true,
    width: 100,
    height: 100,
  });
  S.fc.on('object:added', () => pushHistory());
  S.fc.on('object:modified', () => pushHistory());
  S.fc.on('object:removed', () => pushHistory());
  pushHistory();
}

// ===== Page Rendering =====
async function renderPage() {
  if (!S.pdfDoc) return;
  const page = await S.pdfDoc.getPage(S.currentPage);
  const dpr = window.devicePixelRatio || 1;
  const viewport = page.getViewport({ scale: S.zoom * dpr });
  const canvas = els.pdfCanvas;
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  canvas.style.width = `${viewport.width / dpr}px`;
  canvas.style.height = `${viewport.height / dpr}px`;

  await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

  // Resize fabric overlay
  if (S.fc) {
    const cssW = viewport.width / dpr;
    const cssH = viewport.height / dpr;
    S.fc.setDimensions({ width: cssW, height: cssH });

    // Restore annotations
    const saved = S.annotations.get(S.currentPage);
    if (saved) {
      S.isRestoring = true;
      await S.fc.loadFromJSON(saved);
      S.fc.renderAll();
      S.isRestoring = false;
    }

    S.history = [serializeCanvas()];
    S.historyIdx = 0;
  }
  updateStatus();

  // Extract text items for editText tool
  try {
    const pg = await S.pdfDoc.getPage(S.currentPage);
    const vp1 = pg.getViewport({ scale: 1 });
    const pdfH = vp1.height;
    const scale = S.zoom;
    const textContent = await pg.getTextContent();
    S.pageTextItems = textContent.items
      .filter(item => item.str && item.str.trim())
      .map(item => {
        const t = item.transform;
        // Font size from the text matrix (handles rotation too)
        const pdfFontSize = Math.sqrt(t[2] * t[2] + t[3] * t[3]) || Math.sqrt(t[0] * t[0] + t[1] * t[1]);
        const fontSize = pdfFontSize * scale;
        const x = t[4] * scale;
        const baselineY = (pdfH - t[5]) * scale;
        // Ensure minimum dimensions for hit testing
        const w = Math.max((item.width || pdfFontSize * item.str.length * 0.6) * scale, 20);
        const h = Math.max(fontSize * 1.3, 14);
        return {
          str: item.str,
          x, y: baselineY - fontSize,
          width: w,
          height: h,
          fontSize: Math.max(fontSize, 10),
          pdfX: t[4], pdfY: t[5],
          pdfFontSize,
          pdfWidth: item.width || pdfFontSize * item.str.length * 0.6,
          fontName: item.fontName || '',
        };
      });
    console.log(`[editText] Extracted ${S.pageTextItems.length} text items from page ${S.currentPage}`);
  } catch (e) {
    console.warn('extractTextItems failed:', e);
    S.pageTextItems = [];
  }
}

async function changePage(newPage) {
  if (newPage < 1 || newPage > S.totalPages || newPage === S.currentPage) return;
  saveAnnotations(S.currentPage);
  if (S.fc) S.fc.clear();
  S.currentPage = newPage;
  await renderPage();
  applyTool();
  // highlight thumbnail
  $$('.thumb-btn').forEach((el, i) => el.classList.toggle('active', i + 1 === S.currentPage));
}

// ===== Thumbnails =====
async function renderThumbnails() {
  els.thumbs.innerHTML = '';
  for (let i = 1; i <= S.totalPages; i++) {
    const page = await S.pdfDoc.getPage(i);
    const vp = page.getViewport({ scale: 0.3 });
    const btn = document.createElement('button');
    btn.className = `thumb-btn${i === 1 ? ' active' : ''}`;
    const c = document.createElement('canvas');
    c.width = vp.width;
    c.height = vp.height;
    await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;
    const num = document.createElement('span');
    num.className = 'thumb-num';
    num.textContent = i;
    btn.appendChild(c);
    btn.appendChild(num);
    btn.addEventListener('click', () => changePage(i));
    els.thumbs.appendChild(btn);
  }
}

// ===== Tool Switching =====
function applyTool() {
  const fc = S.fc;
  if (!fc) return;
  fc.isDrawingMode = false;
  fc.selection = true;
  fc.defaultCursor = 'default';
  fc.hoverCursor = 'move';
  // Remove text block outlines and hover highlights when switching tools
  fc.getObjects().filter(o => o._isTextBlock || o._isHoverHighlight).forEach(o => fc.remove(o));
  fc.forEachObject(o => { o.selectable = true; o.evented = true; });
  fc.off('mouse:down');
  fc.off('mouse:move');
  fc.off('mouse:up');

  const t = S.activeTool;
  if (t === 'draw') {
    fc.isDrawingMode = true;
    fc.freeDrawingBrush = new fabric.PencilBrush(fc);
    fc.freeDrawingBrush.color = S.color;
    fc.freeDrawingBrush.width = S.strokeWidth;
  } else if (t === 'highlight') {
    fc.isDrawingMode = true;
    fc.freeDrawingBrush = new fabric.PencilBrush(fc);
    fc.freeDrawingBrush.color = S.color + '4D';
    fc.freeDrawingBrush.width = S.strokeWidth * 6;
  } else if (t === 'text') {
    fc.isDrawingMode = false;
    fc.selection = false;
    fc.defaultCursor = 'text';
    fc.hoverCursor = 'text';
    fc.forEachObject(o => { o.selectable = false; o.evented = false; });
    const handler = (opt) => {
      const pointer = fc.getScenePoint(opt.e);
      const text = new fabric.IText('文字', {
        left: pointer.x, top: pointer.y,
        fontSize: S.strokeWidth * 4 + 12,
        fill: S.color,
        fontFamily: 'sans-serif',
      });
      fc.add(text);
      fc.setActiveObject(text);
      text.enterEditing();
      fc.off('mouse:down', handler);
    };
    fc.on('mouse:down', handler);
  } else if (t === 'rectangle') {
    fc.isDrawingMode = false;
    fc.selection = false;
    fc.defaultCursor = 'crosshair';
    fc.hoverCursor = 'crosshair';
    fc.forEachObject(o => { o.selectable = false; o.evented = false; });
    fc.on('mouse:down', (opt) => {
      const p = fc.getScenePoint(opt.e);
      S.drawObj = { startX: p.x, startY: p.y, rect: null };
    });
    fc.on('mouse:move', (opt) => {
      if (!S.drawObj) return;
      const p = fc.getScenePoint(opt.e);
      const left = Math.min(S.drawObj.startX, p.x);
      const top = Math.min(S.drawObj.startY, p.y);
      const w = Math.abs(p.x - S.drawObj.startX);
      const h = Math.abs(p.y - S.drawObj.startY);
      if (!S.drawObj.rect) {
        S.drawObj.rect = new fabric.Rect({
          left, top, width: w, height: h,
          fill: 'transparent', stroke: S.color,
          strokeWidth: S.strokeWidth, selectable: false, evented: false,
        });
        fc.add(S.drawObj.rect);
      } else {
        S.drawObj.rect.set({ left, top, width: w, height: h });
        fc.renderAll();
      }
    });
    fc.on('mouse:up', () => {
      if (S.drawObj?.rect) {
        S.drawObj.rect.set({ selectable: true, evented: true });
        fc.setActiveObject(S.drawObj.rect);
        fc.renderAll();
      }
      S.drawObj = null;
    });
  } else if (t === 'eraser') {
    fc.isDrawingMode = false;
    fc.selection = false;
    fc.defaultCursor = 'not-allowed';
    fc.hoverCursor = 'not-allowed';
    fc.on('mouse:down', (opt) => {
      const target = fc.findTarget(opt.e);
      if (target && target.type) {
        fc.remove(target);
        fc.renderAll();
      }
    });
  } else if (t === 'editText') {
    fc.isDrawingMode = false;
    fc.selection = false;
    fc.defaultCursor = 'default';
    fc.hoverCursor = 'pointer';

    // --- Acrobat-style: show ALL text blocks as clickable blue-bordered regions ---
    // Remove any previous text block outlines
    fc.getObjects().filter(o => o._isTextBlock).forEach(o => fc.remove(o));

    // Allow existing text edits to remain selectable
    fc.forEachObject(o => {
      if (o._isTextEdit) { o.selectable = true; o.evented = true; }
    });

    console.log(`[editText] Creating ${S.pageTextItems.length} text block outlines`);

    // Create a clickable outline rect for every extracted text item
    for (const item of S.pageTextItems) {
      // Skip if already has an edit overlay at this position
      const alreadyEdited = fc.getObjects().find(o =>
        o._isTextEdit && Math.abs(o._pdfX - item.pdfX) < 1 && Math.abs(o._pdfY - item.pdfY) < 1
      );
      if (alreadyEdited) continue;

      const blockRect = new fabric.Rect({
        left: item.x - 1,
        top: item.y - 1,
        width: item.width + 2,
        height: item.height + 2,
        fill: 'rgba(66,133,244,0.08)',
        stroke: 'rgba(66,133,244,0.5)',
        strokeWidth: 1,
        selectable: false,
        evented: true,
        hoverCursor: 'text',
        // Store text item data on the rect
        _isTextBlock: true,
        _textItem: item,
      });
      fc.add(blockRect);
    }
    fc.renderAll();

    // When a text block is clicked, replace it with an editable IText
    fc.on('mouse:down', (opt) => {
      const target = opt.target;

      // Clicked an existing IText edit → enter editing
      if (target && target._isTextEdit) {
        fc.setActiveObject(target);
        target.enterEditing();
        return;
      }

      // Clicked a text block outline → create editable IText
      if (target && target._isTextBlock) {
        const item = target._textItem;
        console.log(`[editText] Editing: "${item.str}" at (${item.x.toFixed(1)}, ${item.y.toFixed(1)})`);

        // Remove the outline rect
        fc.remove(target);

        // White rect to cover original text
        const bg = new fabric.Rect({
          left: item.x - 2, top: item.y - 1,
          width: item.width + 6, height: item.height + 2,
          fill: 'white', selectable: false, evented: false,
          _isTextEditBg: true,
          _pdfX: item.pdfX, _pdfY: item.pdfY,
        });
        fc.add(bg);

        // Editable IText
        const itext = new fabric.IText(item.str, {
          left: item.x, top: item.y,
          fontSize: item.fontSize,
          fill: '#000000',
          fontFamily: 'sans-serif',
          _isTextEdit: true,
          _origStr: item.str,
          _pdfX: item.pdfX,
          _pdfY: item.pdfY,
          _pdfFontSize: item.pdfFontSize,
          _pdfWidth: item.pdfWidth,
          _fontName: item.fontName,
        });
        fc.add(itext);
        fc.setActiveObject(itext);
        itext.enterEditing();
        return;
      }
    });
  }

  // Update toolbar buttons
  $$('[data-tool]').forEach(b => b.classList.toggle('active', b.dataset.tool === t));
}

// ===== Undo / Redo =====
function undo() {
  if (!S.fc || S.historyIdx <= 0) return;
  S.historyIdx--;
  S.isRestoring = true;
  S.fc.loadFromJSON(S.history[S.historyIdx]).then(() => {
    S.fc.renderAll();
    S.isRestoring = false;
    updateUndoRedo();
  });
}

function redo() {
  if (!S.fc || S.historyIdx >= S.history.length - 1) return;
  S.historyIdx++;
  S.isRestoring = true;
  S.fc.loadFromJSON(S.history[S.historyIdx]).then(() => {
    S.fc.renderAll();
    S.isRestoring = false;
    updateUndoRedo();
  });
}

// ===== Content Stream Editing Helpers =====

// Parse a ToUnicode CMap string into a forward map: hex GID → hex Unicode
function parseToUnicodeCMap(cmapStr) {
  const map = new Map();
  // Parse beginbfchar...endbfchar
  const charBlocks = cmapStr.matchAll(/beginbfchar\s*([\s\S]*?)endbfchar/g);
  for (const block of charBlocks) {
    const lines = block[1].matchAll(/<([0-9A-Fa-f]+)>\s*<([0-9A-Fa-f]+)>/g);
    for (const m of lines) {
      map.set(m[1].toUpperCase(), m[2].toUpperCase());
    }
  }
  // Parse beginbfrange...endbfrange
  const rangeBlocks = cmapStr.matchAll(/beginbfrange\s*([\s\S]*?)endbfrange/g);
  for (const block of rangeBlocks) {
    // Range format: <start> <end> <unicodeStart>
    const ranges = block[1].matchAll(/<([0-9A-Fa-f]+)>\s*<([0-9A-Fa-f]+)>\s*<([0-9A-Fa-f]+)>/g);
    for (const m of ranges) {
      const start = parseInt(m[1], 16);
      const end = parseInt(m[2], 16);
      const uStart = parseInt(m[3], 16);
      const pad = m[1].length;
      for (let i = 0; i <= end - start; i++) {
        const gid = (start + i).toString(16).toUpperCase().padStart(pad, '0');
        const uni = (uStart + i).toString(16).toUpperCase().padStart(m[3].length, '0');
        map.set(gid, uni);
      }
    }
  }
  return map;
}

// Build reverse map: Unicode codepoint (number) → hex GID string
function buildReverseMap(forwardMap) {
  const rev = new Map();
  for (const [gid, uni] of forwardMap) {
    const cp = parseInt(uni, 16);
    if (!rev.has(cp)) rev.set(cp, gid);
  }
  return rev;
}

// Encode a Unicode string as hex glyph IDs using reverse map
function encodeTextAsGlyphIds(text, reverseMap, padLen = 4) {
  let hex = '';
  for (const ch of text) {
    const cp = ch.codePointAt(0);
    const gid = reverseMap.get(cp);
    if (!gid) return { hex: '', allFound: false };
    hex += gid.padStart(padLen, '0');
  }
  return { hex, allFound: true };
}

// Get content stream bytes from a page, handling single ref or array
function getContentStreamInfo(pdfLibDoc, page) {
  const { PDFName, PDFArray, PDFRawStream } = PDFLib;
  const contentsEntry = page.node.get(PDFName.of('Contents'));
  if (!contentsEntry) return null;
  const ref = contentsEntry;
  const resolved = pdfLibDoc.context.lookup(ref);

  if (resolved instanceof PDFArray) {
    // Multiple content streams — concatenate
    let combined = '';
    const refs = [];
    for (let i = 0; i < resolved.size(); i++) {
      const streamRef = resolved.get(i);
      refs.push(streamRef);
      const stream = pdfLibDoc.context.lookup(streamRef);
      const bytes = stream.getContents();
      combined += new TextDecoder('latin1').decode(bytes) + '\n';
    }
    return { text: combined, ref: ref, refs, isArray: true };
  } else {
    // Single content stream
    const bytes = resolved.getContents();
    const text = new TextDecoder('latin1').decode(bytes);
    return { text, ref: ref, refs: [ref], isArray: false };
  }
}

// Get ToUnicode CMap for a font on a page
function getFontToUnicodeCMap(pdfLibDoc, page, fontName) {
  const { PDFName } = PDFLib;
  try {
    const resources = page.node.get(PDFName.of('Resources'));
    if (!resources) return null;
    const resDict = pdfLibDoc.context.lookup(resources);
    const fontDict = resDict?.get?.(PDFName.of('Font')) || resDict;
    const fontDictResolved = pdfLibDoc.context.lookup(fontDict);
    if (!fontDictResolved) return null;

    // fontName from pdfjs may include a prefix like "g_d0_f1" — try direct and stripped
    let fontObj = null;
    const candidates = [fontName];
    // Also try stripping the "g_dX_" prefix that pdfjs adds
    const stripped = fontName.replace(/^g_d\d+_/, '');
    if (stripped !== fontName) candidates.push(stripped);

    for (const name of candidates) {
      const entry = fontDictResolved.get?.(PDFName.of(name));
      if (entry) {
        fontObj = pdfLibDoc.context.lookup(entry);
        break;
      }
    }

    // If not found by name, iterate all fonts and try to match
    if (!fontObj && fontDictResolved.entries) {
      for (const [, value] of fontDictResolved.entries()) {
        const f = pdfLibDoc.context.lookup(value);
        fontObj = f; // use first font as fallback
        break;
      }
    }
    if (!fontObj) return null;

    // Look for ToUnicode stream
    const toUnicodeRef = fontObj.get?.(PDFName.of('ToUnicode'));
    if (!toUnicodeRef) {
      // Check DescendantFonts for CIDFont
      const descFonts = fontObj.get?.(PDFName.of('DescendantFonts'));
      if (descFonts) {
        const descArr = pdfLibDoc.context.lookup(descFonts);
        if (descArr?.get) {
          const cidFont = pdfLibDoc.context.lookup(descArr.get(0));
          const cidToUnicode = cidFont?.get?.(PDFName.of('ToUnicode'));
          if (cidToUnicode) {
            const stream = pdfLibDoc.context.lookup(cidToUnicode);
            const bytes = stream.getContents();
            return new TextDecoder().decode(bytes);
          }
        }
      }
      return null;
    }

    const stream = pdfLibDoc.context.lookup(toUnicodeRef);
    const bytes = stream.getContents();
    return new TextDecoder().decode(bytes);
  } catch (e) {
    console.warn('getFontToUnicodeCMap error:', e);
    return null;
  }
}

// Lazy-load fallback CJK font
async function loadFallbackFont() {
  if (S.fallbackFont) return S.fallbackFont;
  try {
    const resp = await fetch('https://cdn.jsdelivr.net/fontsource/fonts/noto-sans-sc@latest/chinese-simplified-400-normal.ttf');
    if (!resp.ok) throw new Error('Font fetch failed: ' + resp.status);
    S.fallbackFont = new Uint8Array(await resp.arrayBuffer());
    return S.fallbackFont;
  } catch (e) {
    console.warn('Fallback font load failed:', e);
    return null;
  }
}

// ===== Download with Annotations =====
async function downloadPdf() {
  if (!S.pdfBytes || !S.fc) return;
  try {
    // Remove transient text block outlines before saving (they're only for editing UI)
    const textBlockObjs = S.fc.getObjects().filter(o => o._isTextBlock);
    textBlockObjs.forEach(o => S.fc.remove(o));

    saveAnnotations(S.currentPage);
    const { PDFDocument, rgb } = PDFLib;
    const pdfLibDoc = await PDFDocument.load(S.pdfBytes);
    let embeddedFallbackFont = null; // lazy embed once across all pages (CJK)
    let embeddedStandardFont = null; // lazy embed once (Latin - Helvetica)

    for (const [pageNum, json] of S.annotations) {
      let parsed;
      try { parsed = JSON.parse(json); } catch { continue; }
      if (!parsed.objects?.length) continue;

      const page = pdfLibDoc.getPage(pageNum - 1);
      const { width: pdfW, height: pdfH } = page.getSize();

      // Separate text edits from regular annotations
      const textEditObjs = parsed.objects.filter(o => o._isTextEdit && o.text !== o._origStr);
      const otherObjs = parsed.objects.filter(o => !o._isTextEdit && !o._isTextEditBg && !o._isTextBlock);
      console.log(`Page ${pageNum}: total=${parsed.objects.length}, textEdits=${textEditObjs.length}, other=${otherObjs.length}`);

      // ===== Process text edits with 3-tier strategy =====
      if (textEditObjs.length > 0) {
        // Get content stream info once per page
        let csInfo = null;
        let csModified = false;
        try { csInfo = getContentStreamInfo(pdfLibDoc, page); } catch (e) {
          console.warn('Could not read content stream:', e);
        }

        for (const edit of textEditObjs) {
          let handled = false;
          const newText = edit.text;

          // --- Tier 1: Direct content stream editing via ToUnicode reverse map ---
          if (csInfo && !handled) {
            try {
              const cacheKey = `${pageNum - 1}:${edit._fontName}`;
              let maps = S.toUnicodeMaps.get(cacheKey);
              if (!maps) {
                const cmapStr = getFontToUnicodeCMap(pdfLibDoc, page, edit._fontName);
                if (cmapStr) {
                  const forward = parseToUnicodeCMap(cmapStr);
                  const reverse = buildReverseMap(forward);
                  maps = { forward, reverse };
                  S.toUnicodeMaps.set(cacheKey, maps);
                }
              }
              if (maps && maps.reverse.size > 0) {
                // Determine GID padding length from existing map entries
                const sampleGid = maps.forward.keys().next().value;
                const padLen = sampleGid ? sampleGid.length : 4;

                // Encode original text as glyph IDs
                const origEnc = encodeTextAsGlyphIds(edit._origStr, maps.reverse, padLen);
                // Encode new text as glyph IDs
                const newEnc = encodeTextAsGlyphIds(newText, maps.reverse, padLen);

                if (origEnc.allFound && newEnc.allFound) {
                  // Search and replace in content stream (case-insensitive hex)
                  const origHexUpper = origEnc.hex.toUpperCase();
                  const newHexUpper = newEnc.hex.toUpperCase();
                  const csUpper = csInfo.text.toUpperCase();
                  const idx = csUpper.indexOf(origHexUpper);
                  if (idx !== -1) {
                    // Replace preserving original case style
                    csInfo.text = csInfo.text.substring(0, idx) + newHexUpper + csInfo.text.substring(idx + origHexUpper.length);
                    csModified = true;
                    handled = true;
                    console.log(`Tier 1 OK: "${edit._origStr}" → "${newText}" (content stream hex replaced)`);
                  }
                }
                // Also try literal string format: (text) Tj
                if (!handled) {
                  const escaped = edit._origStr.replace(/[\(\)\\]/g, '\\$&');
                  const litPattern = '(' + escaped + ')';
                  if (csInfo.text.includes(litPattern)) {
                    const newEscaped = newText.replace(/[\(\)\\]/g, '\\$&');
                    csInfo.text = csInfo.text.replace(litPattern, '(' + newEscaped + ')');
                    csModified = true;
                    handled = true;
                    console.log(`Tier 1 OK: "${edit._origStr}" → "${newText}" (literal string replaced)`);
                  }
                }
              }
            } catch (e) {
              console.warn('Tier 1 content stream edit failed:', e);
            }
          }

          // --- Tier 2: Font substitution with embedded fallback font ---
          if (!handled) {
            try {
              // Detect if text contains CJK characters
              const hasCJK = /[\u2E80-\u9FFF\uF900-\uFAFF\uFE30-\uFE4F]/.test(newText);
              let tier2Font = null;
              if (hasCJK) {
                if (!embeddedFallbackFont) {
                  const fontBytes = await loadFallbackFont();
                  if (fontBytes) {
                    embeddedFallbackFont = await pdfLibDoc.embedFont(fontBytes, { subset: true });
                  }
                }
                tier2Font = embeddedFallbackFont;
              } else {
                // Latin text: use built-in standard font (no download needed)
                if (!embeddedStandardFont) {
                  embeddedStandardFont = await pdfLibDoc.embedFont(PDFLib.StandardFonts.Helvetica);
                }
                tier2Font = embeddedStandardFont;
              }
              if (tier2Font) {
                // White rect over original text
                page.drawRectangle({
                  x: edit._pdfX - 1,
                  y: edit._pdfY - edit._pdfFontSize * 0.3,
                  width: edit._pdfWidth + 4,
                  height: edit._pdfFontSize * 1.4,
                  color: rgb(1, 1, 1),
                  borderWidth: 0,
                });
                // Draw new text with substitution font
                page.drawText(newText, {
                  x: edit._pdfX,
                  y: edit._pdfY,
                  size: edit._pdfFontSize,
                  font: tier2Font,
                  color: rgb(0, 0, 0),
                });
                handled = true;
                console.log(`Tier 2 OK: "${edit._origStr}" → "${newText}" (fallback font substitution)`);
              }
            } catch (e) {
              console.warn('Tier 2 font substitution failed:', e);
            }
          }

          // --- Tier 3: PNG micro-overlay (last resort) ---
          if (!handled) {
            try {
              const dpr = 4; // high DPI for quality
              const w = Math.max(edit._pdfWidth + 4, 50);
              const h = edit._pdfFontSize * 1.5;
              const tmpCanvas = document.createElement('canvas');
              tmpCanvas.width = Math.ceil(w * dpr);
              tmpCanvas.height = Math.ceil(h * dpr);
              const ctx = tmpCanvas.getContext('2d');
              ctx.scale(dpr, dpr);
              // White background
              ctx.fillStyle = 'white';
              ctx.fillRect(0, 0, w, h);
              // Draw text
              ctx.fillStyle = 'black';
              ctx.font = `${edit._pdfFontSize}px sans-serif`;
              ctx.textBaseline = 'alphabetic';
              ctx.fillText(newText, 1, edit._pdfFontSize);
              const pngDataUrl = tmpCanvas.toDataURL('image/png');
              const pngBytes = await fetch(pngDataUrl).then(r => r.arrayBuffer());
              const pngImg = await pdfLibDoc.embedPng(pngBytes);
              page.drawImage(pngImg, {
                x: edit._pdfX - 1,
                y: edit._pdfY - edit._pdfFontSize * 0.3,
                width: w,
                height: h,
              });
              handled = true;
              console.log(`Tier 3 OK: "${edit._origStr}" → "${newText}" (PNG micro-overlay)`);
            } catch (e) {
              console.error('All tiers failed for text edit:', e);
            }
          }
        }

        // Write modified content stream back
        if (csModified && csInfo) {
          try {
            const newBytes = Uint8Array.from(csInfo.text, c => c.charCodeAt(0));
            if (csInfo.isArray) {
              // Replace first stream ref with combined content, remove others
              const newStream = pdfLibDoc.context.flateStream(newBytes);
              const firstRef = csInfo.refs[0];
              pdfLibDoc.context.assign(firstRef, newStream);
              // Point Contents to single ref
              page.node.set(PDFLib.PDFName.of('Contents'), firstRef);
            } else {
              const newStream = pdfLibDoc.context.flateStream(newBytes);
              pdfLibDoc.context.assign(csInfo.ref, newStream);
            }
            console.log(`Content stream written back for page ${pageNum}`);
          } catch (e) {
            console.warn('Failed to write content stream:', e);
          }
        }
      }

      // ===== Process regular annotations via PNG overlay =====
      if (otherObjs.length > 0) {
        S.isRestoring = true;
        S.fc.clear();
        const filteredJson = { ...parsed, objects: otherObjs };
        await S.fc.loadFromJSON(JSON.stringify(filteredJson));
        S.fc.backgroundColor = 'transparent';
        S.fc.renderAll();
        S.isRestoring = false;

        const dataUrl = S.fc.toDataURL({ format: 'png' });
        const pngBytes = await fetch(dataUrl).then(r => r.arrayBuffer());
        const pngImage = await pdfLibDoc.embedPng(pngBytes);
        page.drawImage(pngImage, { x: 0, y: 0, width: pdfW, height: pdfH });
      }
    }

    // Restore current page annotations
    const saved = S.annotations.get(S.currentPage);
    S.isRestoring = true;
    S.fc.clear();
    if (saved) {
      await S.fc.loadFromJSON(saved);
    }
    S.fc.renderAll();
    S.isRestoring = false;

    const bytes = await pdfLibDoc.save();
    const blob = new Blob([bytes.buffer], { type: 'application/pdf' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = S.fileName.replace('.pdf', '') + '_edited.pdf';
    a.click();
    URL.revokeObjectURL(a.href);
  } catch (e) {
    console.error(e);
    alert('匯出 PDF 失敗: ' + e.message);
  }
}

// ===== Event Bindings =====

// File upload
function handleFile(file) {
  if (!file) return;
  const isPdf = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');
  if (!isPdf) return;
  const reader = new FileReader();
  reader.onload = () => loadPdf(file, reader.result);
  reader.readAsArrayBuffer(file);
}

els.fileInput.addEventListener('change', (e) => { handleFile(e.target.files[0]); e.target.value = ''; });
els.uploadBox.addEventListener('click', () => els.fileInput.click());
els.uploadBox.addEventListener('dragover', (e) => { e.preventDefault(); els.uploadBox.classList.add('drag'); });
els.uploadBox.addEventListener('dragleave', () => els.uploadBox.classList.remove('drag'));
els.uploadBox.addEventListener('drop', (e) => { e.preventDefault(); els.uploadBox.classList.remove('drag'); handleFile(e.dataTransfer.files[0]); });

// Also allow drop on the entire canvas area
document.body.addEventListener('dragover', (e) => e.preventDefault());
document.body.addEventListener('drop', (e) => { e.preventDefault(); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });

// Toolbar buttons
$('#btn-open').addEventListener('click', () => els.fileInput.click());
$('#btn-download').addEventListener('click', downloadPdf);
$('#btn-prev').addEventListener('click', () => changePage(S.currentPage - 1));
$('#btn-next').addEventListener('click', () => changePage(S.currentPage + 1));
els.pageInput.addEventListener('change', () => changePage(parseInt(els.pageInput.value)));
$('#btn-zout').addEventListener('click', () => { S.zoom = Math.max(0.25, S.zoom - 0.25); renderPage(); });
$('#btn-zin').addEventListener('click', () => { S.zoom = Math.min(5, S.zoom + 0.25); renderPage(); });
$('#btn-fit').addEventListener('click', () => {
  if (!S.pdfDoc) return;
  S.pdfDoc.getPage(S.currentPage).then(page => {
    const vp = page.getViewport({ scale: 1 });
    const areaW = els.canvasArea.clientWidth - 32;
    S.zoom = areaW / vp.width;
    renderPage();
  });
});

// Stroke width
$('#stroke-sel').addEventListener('change', (e) => {
  S.strokeWidth = parseInt(e.target.value);
  applyTool();
});

// Undo / Redo
$('#btn-undo').addEventListener('click', undo);
$('#btn-redo').addEventListener('click', redo);

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'Z' || e.key === 'y')) { e.preventDefault(); redo(); }
  if (e.key === 'ArrowLeft' && !e.target.closest('input')) changePage(S.currentPage - 1);
  if (e.key === 'ArrowRight' && !e.target.closest('input')) changePage(S.currentPage + 1);
});

updateStatus();
</script>
</body>
</html>
