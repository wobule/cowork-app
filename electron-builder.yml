appId: com.pdfeditor.app
productName: PDF 編輯器
copyright: Copyright © 2026

directories:
  output: dist-electron

files:
  - "electron/**/*"
  - ".next/**/*"
  - "public/**/*"
  - "src/**/*"
  - "next.config.ts"
  - "tsconfig.json"
  - "postcss.config.mjs"
  - "package.json"
  - "node_modules/**/*"

asar: false

win:
  target:
    # 方式一：安裝版（安裝到使用者目錄，不需管理員權限）
    - target: nsis
      arch:
        - x64
    # 方式二：免安裝版（直接解壓縮就能用，不需任何權限）
    - target: portable
      arch:
        - x64
  icon: public/favicon.ico

nsis:
  oneClick: true
  # 關鍵：安裝到使用者目錄，不需要管理員權限
  perMachine: false
  allowToChangeInstallationDirectory: false
  # 不建立桌面捷徑需要的管理員權限問題
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: PDF 編輯器
  installerLanguages:
    - zh_TW
    - en_US
  # 不要求提升權限
  allowElevation: false

portable:
  # 免安裝版的輸出檔名
  artifactName: "PDF編輯器-免安裝版-${version}.exe"

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.productivity

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Office
